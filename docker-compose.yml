services:
  pwmediamanager:
    build: .
    container_name: pwMediaManager
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      # App source (live-mounted: no rebuild needed after code changes)
      - /mnt/user/appdata/pwMediaManager/app:/app
      # Scripts (read-only mounts from git repos)
      - /mnt/user/Fileserver/scripts/pwMediaEnhancer:/scripts/pwMediaEnhancer:ro
      - /mnt/user/Fileserver/scripts/pwPosterSync:/scripts/pwPosterSync:ro
      # Config for pwMediaEnhancer
      - /boot/config/pwMediaEnhancer.conf:/boot/config/pwMediaEnhancer.conf:ro
      # Media directories (pwMediaEnhancer needs write access to move files)
      - /mnt/user/Fileserver:/fileserver
      - /mnt/user/appdata/pwMediaManager/logs:/logs
    environment:
      - LOGS_DIR=/logs
      - PWMEDIAENHANCER_CONFIG=/boot/config/pwMediaEnhancer.conf
